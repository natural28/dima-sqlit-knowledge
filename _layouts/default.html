<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }} — База знаний Дима SQL-ит</title>
  <meta name="description" content="{{ page.title }}">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="{{ site.baseurl }}/favicon.ico">
  <style>
    :root {
      --bg-dark: #050507;
      --text-main: #b4bacf;
      --text-header: #ffffff;
      --accent-gradient: linear-gradient(135deg, #a45eff 0%, #4f46e5 100%);
      --accent-color: #a45eff;
      --accent-green: #10b981;
      --radius: 20px;
      --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-dark);
      background-image: radial-gradient(circle at 50% -20%, #2e1065 0%, #050507 60%);
      background-attachment: fixed;
      color: var(--text-main);
      line-height: 1.6;
      min-height: 100vh;
    }

    a { text-decoration: none; color: inherit; transition: var(--transition); }
    * { box-sizing: border-box; }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px;
      width: 100%;
    }

    header {
      padding: 20px 0;
      text-align: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      margin-bottom: 40px;
    }

    .logo {
      font-size: 24px;
      font-weight: 800;
      color: var(--text-header);
      margin-bottom: 10px;
    }

    .logo span {
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    nav {
      margin-top: 15px;
    }

    nav a {
      display: inline-block;
      padding: 8px 16px;
      margin: 5px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 50px;
      color: var(--text-main);
      font-size: 14px;
      font-weight: 600;
    }

    nav a:hover {
      background: rgba(164, 94, 255, 0.15);
      border-color: var(--accent-color);
      color: #fff;
    }

    .article {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: var(--radius);
      padding: 40px;
    }

    .article h1 {
      font-size: 32px;
      font-weight: 800;
      color: var(--text-header);
      margin: 0 0 20px;
      line-height: 1.3;
    }

    .article h2 {
      font-size: 24px;
      font-weight: 700;
      color: var(--text-header);
      margin: 30px 0 15px;
    }

    .article h3 {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-header);
      margin: 25px 0 12px;
    }

    .article p {
      margin: 15px 0;
      line-height: 1.7;
    }

    .article ul, .article ol {
      margin: 15px 0;
      padding-left: 25px;
    }

    .article li {
      margin: 8px 0;
    }

    .article code {
      background: rgba(255, 255, 255, 0.1);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
      font-size: 14px;
    }

    .article pre {
      background: rgba(0, 0, 0, 0.3);
      padding: 20px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 20px 0;
    }

    .article pre code {
      background: none;
      padding: 0;
    }

    .article blockquote {
      border-left: 4px solid var(--accent-color);
      padding-left: 20px;
      margin: 20px 0;
      color: #9ca3af;
      font-style: italic;
    }

    .article a {
      color: var(--accent-color);
      text-decoration: underline;
    }

    .article a:hover {
      color: #fff;
    }

    .article hr {
      border: none;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      margin: 30px 0;
    }

    .article strong {
      color: var(--text-header);
    }

    .article em {
      color: #9ca3af;
    }

    .back-link {
      display: inline-block;
      margin-top: 30px;
      color: var(--accent-color);
      font-weight: 600;
      font-size: 14px;
    }

    .back-link:hover {
      color: #fff;
    }

    footer {
      text-align: center;
      padding: 40px 20px;
      color: #6b7280;
      font-size: 13px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      margin-top: 40px;
    }

    footer a {
      color: var(--accent-color);
    }

    footer a:hover {
      color: #fff;
    }

    @media (max-width: 768px) {
      .article {
        padding: 20px;
      }
      .article h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">База знаний <span>Дима SQL-ит</span></div>
      <nav>
        <a href="{{ site.baseurl }}/">🏠 Главная</a>
        <a href="https://mentor.dima-sqlit.ru">🎯 Менторство</a>
        <a href="https://t.me/dima_sqlit">📱 Telegram канал</a>
      </nav>
    </header>

    <article class="article">
      {{ content }}
    </article>

    <a href="{{ site.baseurl }}/" class="back-link">← Назад к списку статей</a>

    <footer>
      <p>© 2024-2025 Дима SQL-ит • <a href="https://t.me/dima_sqlit">Telegram канал</a> • <a href="https://mentor.dima-sqlit.ru">Менторство</a></p>
    </footer>
  </div>
</body>
</html>
